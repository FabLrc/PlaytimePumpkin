name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust with wasm32-wasip2
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target wasm32-wasip2

      - name: Get version
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename artifact
        run: |
          cp target/wasm32-wasip2/release/playtime_pumpkin.wasm \
             playtime_pumpkin-${{ steps.version.outputs.version }}.wasm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: playtime_pumpkin-${{ steps.version.outputs.version }}
          path: playtime_pumpkin-${{ steps.version.outputs.version }}.wasm

      - name: Check if release exists
        id: check_release
        if: github.ref == 'refs/heads/main'
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        if: github.ref == 'refs/heads/main' && steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: playtime_pumpkin-${{ steps.version.outputs.version }}.wasm
          make_latest: true
