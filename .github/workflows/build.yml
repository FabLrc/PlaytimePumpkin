name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust with wasm32-wasip2
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Get version
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename artifact
        run: |
          cp target/wasm32-wasip2/release/playtime_pumpkin.wasm \
             playtime_pumpkin-${{ steps.version.outputs.version }}.wasm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: playtime_pumpkin-${{ steps.version.outputs.version }}
          path: playtime_pumpkin-${{ steps.version.outputs.version }}.wasm

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: playtime_pumpkin-${{ steps.version.outputs.version }}.wasm
